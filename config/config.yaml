# ─── Cameras ──────────────────────────────────────────────────────────────────
cameras:
  wide:
    source: 0                  # wide-angle camera: index or RTSP URL
    width: 1280
    height: 720
    fps: 30
  topdown:
    source: 2                  # top-down camera aimed at sink: index or RTSP URL
    width: 640
    height: 640
    fps: 30
    gesture_roi: null          # null = full frame; or [x1, y1, x2, y2] to crop

# ─── Detection (Layer 1) ──────────────────────────────────────────────────────
detection:
  weights: models/weights/yolov8_detection.pt
  conf_threshold: 0.4
  iou_threshold: 0.45
  classes:
    person: 0
    sink: 1
    # soap_dispenser: 2  — excluded from MVP (insufficient training data)
    # Open Images V7 has ~58 examples; HandwashDetector is not called at
    # runtime — zones are polygon-based. Re-add with purpose-collected data.
  input_size: 640              # YOLOv8 input resolution

# ─── Tracking ─────────────────────────────────────────────────────────────────
tracking:
  tracker: bytetrack
  track_high_thresh: 0.5
  track_low_thresh: 0.1
  new_track_thresh: 0.6
  track_buffer: 30             # frames to keep lost track alive
  match_thresh: 0.8

# ─── Zone Definitions (polygon vertices, pixel coords) ────────────────────────
zones:
  entry:
    polygon: [[0, 0], [1280, 0], [1280, 200], [0, 200]]
  sink:
    polygon: [[400, 200], [880, 200], [880, 600], [400, 600]]
  exit:
    polygon: [[0, 520], [1280, 520], [1280, 720], [0, 720]]

# ─── Compliance Rules ─────────────────────────────────────────────────────────
compliance:
  min_wash_duration_sec: 20    # WHO guideline minimum
  max_entry_to_sink_sec: 10    # how long before a violation is flagged
  who_steps: 6                 # 6 WHO rubbing steps (matches METC annotation codes 1-6)

# ─── Gesture Classifier (Layer 2 — YOLOv8-cls) ───────────────────────────────
# Classes align to METC annotation codes 1-6 (code 0 = "other", discarded).
# Labels match WHO Hand Hygiene poster steps 2-7.
gesture:
  weights: models/weights/gesture_classifier.pt
  num_classes: 6
  conf_threshold: 0.6
  input_size: 224              # YOLOv8-cls crop resolution
  step_labels:
    0: "palm_to_palm"          # METC code 1 — WHO step 2
    1: "palm_over_dorsum"      # METC code 2 — WHO step 3
    2: "fingers_interlaced"    # METC code 3 — WHO step 4
    3: "backs_of_fingers"      # METC code 4 — WHO step 5
    4: "rotational_thumb"      # METC code 5 — WHO step 6
    5: "fingertips_to_palm"    # METC code 6 — WHO step 7

# ─── Output ───────────────────────────────────────────────────────────────────
output:
  led_gpio_pin: 17             # Raspberry Pi / Modalix GPIO pin
  log_dir: logs/
  dashboard_port: 5000
